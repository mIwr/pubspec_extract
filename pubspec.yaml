name: pubspec_extract
description: Extracts Dart pubspec.yaml file and generate pubspec.dart at build time
homepage: https://github.com/DavBfr/pubspec_extract
_author: David PHAM-VAN <dev.nfet.net@gmail.com>
version: 2.1.1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  args: ^2.5.0
  build: ">=2.4.1 <5.0.0"
  dart_style: ">=2.3.6 <4.0.0"
  logging: ^1.2.0
  path: ^1.9.0
  pub_semver: ^2.1.4
  yaml: ^3.1.2

dev_dependencies:
  lints: ">=4.0.0 <7.0.0"
  test: ^1.25.5

executables:
  pubspec_extract:
